<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Gateway</title>
    <style>
        /* Base page layout centering the user access box */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Card container for the form structures */
        .auth-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 360px;
        }

        .auth-container h2 {
            margin-bottom: 20px;
            color: #333333;
            text-align: center;
        }

        /* Form component spacing fields apart vertically */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666666;
            font-size: 14px;
        }

        /* Textured interactive states for inputs */
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
        }

        /* Functional interaction for action triggers */
        .auth-btn {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .auth-btn:hover {
            background-color: #0056b3;
        }

        /* Utilities formatting structural navigation links */
        .form-footer {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
        }

        .form-footer a {
            color: #007bff;
            text-decoration: none;
            cursor: pointer;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* Utility helper hidden class used to alternate display states */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <!-- ==================== LOGIN SCREEN FORM ==================== -->
        <div id="login-box">
            <h2>Account Login</h2>
            <form action="index.html" method="GET">
                <div class="form-group">
                    <label for="login-username">Username or Email</label>
                    <input type="text" id="login-username" name="username" placeholder="Enter username" required>
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="auth-btn">Sign In</button>
                
                <div class="form-footer">
                    <p><a href="#">Forgot Password?</a></p>
                    <p>New user? <a onclick="toggleForm('signup')">Create an account</a></p>
                </div>
            </form>
        </div>

        <!-- ==================== SIGN-UP SCREEN FORM ==================== -->
        <div id="signup-box" class="hidden">
            <h2>Create Account</h2>
            <form action="index.html" method="GET">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" name="fullname" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" name="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" placeholder="Create a password" required>
                </div>
                
                <button type="submit" class="auth-btn">Register</button>
                
                <div class="form-footer">
                    <p>Already have an account? <a onclick="toggleForm('login')">Sign In</a></p>
                </div>
            </form>
        </div>

    </div>

    <!-- UI view switcher script toggling class attributes dynamically -->
    <script>
        function toggleForm(formType) {
            const loginBox = document.getElementById('login-box');
            const signupBox = document.getElementById('signup-box');
            
            if (formType === 'signup') {
                loginBox.classList.add('hidden');
                signupBox.classList.remove('hidden');
            } else {
                signupBox.classList.add('hidden');
                loginBox.classList.remove('hidden');
            }
        }
    </script>

</body>
</html>
