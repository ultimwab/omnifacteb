<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Account Login</title>
    <style>
        /* Base page layout centering the login box */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Card container for the form content */
        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 360px;
        }

        .login-container h2 {
            margin-bottom: 20px;
            color: #333333;
            text-align: center;
        }

        /* Form component spacing fields apart vertically */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666666;
            font-size: 14px;
        }

        /* Textured interactive states for the inputs */
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
        }

        /* Functional interaction for the click target */
        .login-btn {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .login-btn:hover {
            background-color: #0056b3;
        }

        /* Utilities formatting secondary navigation options */
        .form-footer {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
        }

        .form-footer a {
            color: #007bff;
            text-decoration: none;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Account Login</h2>
        
        <!-- Action attribute updated to load index.html locally upon submission -->
        <form action="index.html" method="GET">
            
            <!-- Email input area targeting individual identifiers -->
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            
            <!-- Secure password rendering mask input mechanism -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <!-- Trigger fires validation rules on click -->
            <button type="submit" class="login-btn">Sign In</button>
            
            <div class="form-footer">
                <p><a href="#">Forgot Password?</a></p>
                <p>New user? <a href="#">Create an account</a></p>
            </div>
        </form>
    </div>

</body>
</html>
