<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniFactEb</title>
    <script src="https://cloudflare.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amita:wght@400;700&display=swap');
        :root { --bg: #1a1a1a; --sidebar: #2b2b2b; --accent: #00ff88; --gold: #d4af37; --text: #efefef; --border: #444; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Amita', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        nav { width: 240px; background: var(--sidebar); border-right: 2px solid var(--gold); display: flex; flex-direction: column; padding: 20px; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: var(--gold); color: #1a1a1a; font-weight: 700; }

        /* Main Screen */
        main { flex: 1; display: flex; flex-direction: column; }
        header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: var(--sidebar); border-bottom: 1px solid var(--border); }
        .content { flex: 1; padding: 30px; overflow-y: auto; display: flex; justify-content: center; }
        .screen { width: 100%; max-width: 850px; display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Digitheoremo Styles */
        .calc-container { background: #2b2b2b; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); }
        #display { background: #000; height: 70px; border-radius: 8px; font-size: 32px; text-align: right; padding: 0 15px; line-height: 70px; color: var(--accent); font-family: 'Seven Segment', monospace; border: 1px solid var(--border); overflow: hidden; margin-bottom: 15px; }

        /* Games UI */
        .card { background: var(--sidebar); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px;}
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .ttt-board { display: grid; grid-template-columns: repeat(3, 80px); gap: 5px; justify-content: center; margin: 20px 0; }
        .cell { width: 80px; height: 80px; background: #3d3d3d; border-radius: 8px; font-size: 2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        button { background: #3d3d3d; color: white; border: 1px solid var(--gold); padding: 10px; border-radius: 6px; cursor: pointer; }
        .btn-accent { background: var(--accent); color: black; font-weight: bold; }
        select { background: #000; color: var(--accent); border: 1px solid var(--gold); padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<nav>
    <h1 style="color:var(--gold); text-align:center;">OmniFactEb</h1>
    <div class="nav-item active" onclick="navTo('home')">🏠 Home</div>
    <div class="nav-item" onclick="navTo('calc')">🔢 Digitheoremo</div>
    <div class="nav-item" onclick="navTo('weather')">🌦️ Weather Scan</div>
    <div class="nav-item" onclick="navTo('games')">🎮 Arcade Games</div>
    <div class="nav-item" onclick="navTo('alarm')">⏰ Routine Alarm</div>
</nav>

<main>
    <header>
        <div style="display:flex; gap:10px">
            <button onclick="undo()" id="uBtn" disabled>⟲ Undo</button>
            <button onclick="redo()" id="rBtn" disabled>⟳ Redo</button>
        </div>
        <div id="clock" style="font-weight:bold; font-size: 1.2rem;">00:00:00</div>
    </header>

    <div class="content">
        <!-- Home -->
        <div id="home" class="screen active">
            <h1>Command Base Online</h1>
            <p>System status: <strong>Optimal</strong>. All tools ready for deployment.</p>
        </div>

        <!-- Digitheoremo -->
        <div id="calc" class="screen">
            <div class="calc-container">
                <div id="display">0</div>
                <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                    <button class="btn-accent" style="background:#c0392b; color:white;" onclick="clearDisplay()">CLEAR</button>
                    <button class="btn-accent" style="background:#d35400; color:white;" onclick="deleteLast()">DEL</button>
                    <button onclick="calculateSqrt()">√</button>
                    <button onclick="startExponent()">^</button>
                    <button onclick="appendValue('7')">7</button><button onclick="appendValue('8')">8</button><button onclick="appendValue('9')">9</button><button onclick="appendValue('/')">÷</button>
                    <button onclick="appendValue('4')">4</button><button onclick="appendValue('5')">5</button><button onclick="appendValue('6')">6</button><button onclick="appendValue('*')">×</button>
                    <button onclick="appendValue('1')">1</button><button onclick="appendValue('2')">2</button><button onclick="appendValue('3')">3</button><button onclick="appendValue('-')">-</button>
                    <button onclick="appendValue('.')">.</button><button onclick="appendValue('0')">0</button><button class="btn-accent" onclick="calculate()">=</button><button onclick="appendValue('+')">+</button>
                </div>
            </div>
        </div>

        <!-- Weather -->
        <div id="weather" class="screen">
            <div class="card">
                <h3>Global Atmospheric Scan</h3>
                <input type="text" id="cityIn" placeholder="Search City..." style="background:#000; color:var(--accent); border:1px solid var(--gold); padding:8px;">
                <button onclick="getWeather()">Scan</button>
                <div id="weatherOut" style="margin-top:15px;"></div>
            </div>
        </div>

        <!-- Games Hub -->
        <div id="games" class="screen">
            <div class="card">
                <h3>Select Game & Difficulty</h3>
                <select id="gameDiff">
                    <option value="easy">Level: EASY (Casual)</option>
                    <option value="hard">Level: HARD (Unbeatable)</option>
                </select>
                <div class="game-grid" style="margin-top:20px;">
                    <button onclick="startTTT()">Tic-Tac-Toe</button>
                    <button onclick="alert('Chess AI loading...')">Chess</button>
                    <button onclick="alert('Ludo AI loading...')">Ludo</button>
                    <button onclick="alert('S&L AI loading...')">Snakes & Ladders</button>
                    <button onclick="alert('Carrom physics loading...')">Carrom</button>
                    <button onclick="alert('RPS AI loading...')">Rock Paper Scissors</button>
                </div>
            </div>
            
            <div id="active-game" class="card" style="display:none;">
                <div id="ttt-wrap">
                    <div id="ttt-status">Your Turn (X)</div>
                    <div class="ttt-board" id="ttt-board"></div>
                </div>
                <button onclick="closeGame()">Quit Game</button>
            </div>
        </div>

        <!-- Alarm -->
        <div id="alarm" class="screen">
            <div class="card">
                <h3>Hilarious Routine Alarm</h3>
                <input type="text" id="aMsg" placeholder="Task to shout...">
                <input type="time" id="aTime">
                <button class="btn-accent" onclick="setAlarm()">Set Shout</button>
                <div id="aStatus" style="margin-top:10px; color:var(--accent)"></div>
            </div>
        </div>
    </div>
</main>

<script>
    // --- NAV & UNDO/REDO ---
    let navHistory = ['home'], redoStack = [];
    function navTo(id, record = true) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.innerText.toLowerCase().includes(id.slice(0,3))));
        if(record && navHistory[navHistory.length-1] !== id) { navHistory.push(id); redoStack = []; }
        document.getElementById('uBtn').disabled = navHistory.length <= 1;
        document.getElementById('rBtn').disabled = redoStack.length === 0;
    }
    function undo() { if(navHistory.length > 1) { redoStack.push(navHistory.pop()); navTo(navHistory[navHistory.length-1], false); } }
    function redo() { if(redoStack.length > 0) { const next = redoStack.pop(); navHistory.push(next); navTo(next, false); } }

    // --- DIGITHEOREMO CALC ---
    const disp = document.getElementById('display');
    let isExponentMode = false;
    function appendValue(val) {
            if (display.innerHTML === '0' || display.innerHTML === 'Error') {
                display.innerHTML = val;
            } else {
                // If user types an operator while in exponent mode, exit exponent mode first
                if (isExponentMode && ['+', '-', '*', '/', '%'].includes(val)) {
                    isExponentMode = false;
                }

                if (isExponentMode) {
                    let sups = display.getElementsByTagName('sup');
                    if (sups.length > 0) {
                        sups[sups.length - 1].innerHTML += val;
                    } else {
                        display.innerHTML += `<sup>${val}</sup>`;
                    }
                } else {
                    display.innerHTML += val;
                }
            }
        }
    function startExponent() {
            if (display.innerHTML !== '0' && display.innerHTML !== 'Error') {
                isExponentMode = true;
            }
        }
    function smartParentheses() {
            const content = display.innerHTML;
            const openCount = (content.match(/\(/g) || []).length;
            const closeCount = (content.match(/\)/g) || []).length;
            
            // Logic: If there is an open bracket and the last char is a number, close it. Otherwise open.
            const lastChar = content.slice(-1);
            if (openCount > closeCount && !isNaN(lastChar) && lastChar !== " " || lastChar === '>') {
                appendValue(')');
            } else {
                appendValue('(');
            }
        }
    function clearDisplay() { disp.innerHTML = '0'; }
    function deleteLast() {
            if (display.innerHTML !== '0' && display.innerHTML !== 'Error') {
                // If last part is an exponent tag, handle it carefully
                if (display.innerHTML.endsWith('</sup>')) {
                    let sups = display.getElementsByTagName('sup');
                    let lastSup = sups[sups.length - 1];
                    if (lastSup.innerHTML.length > 1) {
                        lastSup.innerHTML = lastSup.innerHTML.slice(0, -1);
                    } else {
                        lastSup.remove();
                        isExponentMode = false;
                    }
                } else {
                    display.innerHTML = display.innerHTML.length > 1 ? display.innerHTML.slice(0, -1) : '0';
                }
            }
        }
    function calculate() {
            try {
                let expression = display.innerHTML
                    .replace(/<sup>(.*?)<\/sup>/g, "**($1)") 
                    .replace(/%/g, '/100')
                    .replace(/÷/g, '/')
                    .replace(/×/g, '*');
                
                let res = eval(expression);
                display.innerHTML = Number.isInteger(res) ? res : res.toFixed(4);
                isExponentMode = false;
            } catch { display.innerHTML = "Error"; }
        }
    function calculateSqrt() {
            try {
                let expression = display.innerHTML.replace(/<sup>(.*?)<\/sup>/g, "**($1)").replace(/%/g, '/100');
                let res = Math.sqrt(eval(expression)).toFixed(4);
                display.innerHTML = parseFloat(res);
                isExponentMode = false;
            } catch { display.innerHTML = "Error"; }
        }

    // --- WEATHER ---
    async function getWeather() {
        const city = document.getElementById('cityIn').value;
        try {
            const res = await fetch(`https://wttr.in{city}?format=j1`);
            const data = await res.json();
            document.getElementById('weatherOut').innerHTML = `<strong>${city.toUpperCase()}</strong>: ${data.current_condition[0].temp_C}°C`;
        } catch { alert("Connection Error"); }
    }

    // --- TIC TAC TOE AI (Easy/Hard) ---
    let board = Array(9).fill(null), gameActive = true;
    function startTTT() {
        document.getElementById('active-game').style.display = 'block';
        const tb = document.getElementById('ttt-board');
        tb.innerHTML = '';
        for(let i=0; i<9; i++) {
            let c = document.createElement('div'); c.className = 'cell';
            c.onclick = () => playerMove(i);
            tb.appendChild(c);
        }
    }
    function playerMove(i) {
        if(!board[i] && gameActive) {
            board[i]="X"; document.querySelectorAll('.cell')[i].innerText="X";
            if(!checkWin()) setTimeout(aiMove, 400);
        }
    }
    function aiMove() {
        let diff = document.getElementById('gameDiff').value;
        let empty = board.map((v,i) => v===null?i:null).filter(v=>v!==null);
        if(!empty.length || !gameActive) return;
        let move = (diff === "hard") ? getSmartMove() : empty[Math.floor(Math.random()*empty.length)];
        board[move]="O"; document.querySelectorAll('.cell')[move].innerText="O"; checkWin();
    }
    function getSmartMove() {
        // Unbeatable Hard AI logic (simplified Minimax simulation)
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for(let combo of wins) {
            let line = [board[combo[0]], board[combo[1]], board[combo[2]]];
            if(line.filter(x => x === "O").length === 2 && line.includes(null)) return combo[line.indexOf(null)];
        }
        for(let combo of wins) {
            let line = [board[combo[0]], board[combo[1]], board[combo[2]]];
            if(line.filter(x => x === "X").length === 2 && line.includes(null)) return combo[line.indexOf(null)];
        }
        return board.indexOf(null);
    }
    function checkWin() {
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for(let w of wins) {
            if(board[w[0]] && board[w[0]]===board[w[1]] && board[w[0]]===board[w[2]]) {
                document.getElementById('ttt-status').innerText = board[w[0]] + " Wins!"; gameActive = false; return true;
            }
        }
        if(!board.includes(null)) { document.getElementById('ttt-status').innerText = "Draw!"; gameActive = false; return true; }
        return false;
    }
    function closeGame() { document.getElementById('active-game').style.display = 'none'; board.fill(null); gameActive=true; }

    // --- TIME & ALARM ---
    let alarm = null;
    setInterval(() => {
        const n = new Date(); document.getElementById('clock').innerText = n.toLocaleTimeString();
        let cur = n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0');
        if(alarm && cur === alarm.t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance("HEY! "+alarm.m)); alarm=null; }
    }, 1000);
    function setAlarm() { alarm = { t: document.getElementById('aTime').value, m: document.getElementById('aMsg').value }; alert("Shout Alarm Ready!"); }
</script>
</body>
</html>
